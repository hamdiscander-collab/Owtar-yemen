<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Owtar Yemen</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body{
      margin:0;
      padding:0;
      background:#f5f5f5;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      flex-direction:column;
    }

    h1{
      color:#5b2be0;
    }

    button{
      background:#6c3cff;
      color:white;
      border:none;
      padding:15px 25px;
      border-radius:15px;
      font-size:20px;
      cursor:pointer;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    #status{
      margin-top:20px;
      color:#333;
      font-size:18px;
    }
  </style>
</head>

<body>

  <h1>🎵 Owtar Yemen</h1>

  <button onclick="loginPi()">
    🔐 تسجيل الدخول بـ Pi
  </button>

  <div id="status"></div>

  <script>
    Pi.init({ version: "2.0" });

    async function loginPi() {

      document.getElementById("status").innerText = "جاري تسجيل الدخول...";

      try {

        const scopes = ['username', 'payments'];

        const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);

        document.getElementById("status").innerHTML =
          "✅ مرحباً " + auth.user.username;

      } catch (err) {

        console.error(err);

        document.getElementById("status").innerHTML =
          "❌ فشل تسجيل الدخول";

      }
    }

    function onIncompletePaymentFound(payment) {
      console.log(payment);
    }
  </script>

</body>
</html>
