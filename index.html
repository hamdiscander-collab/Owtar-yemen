<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owtar Yemen</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  color: white;
  text-align: center;
  margin: 0;
}

header {
  padding: 20px;
  font-size: 26px;
  background: #0f3460;
}

.container {
  padding: 20px;
}

textarea {
  width: 90%;
  height: 120px;
  border-radius: 10px;
  padding: 10px;
  font-size: 16px;
}

select, button {
  margin: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  background: #e94560;
  color: white;
  cursor: pointer;
}

.card {
  background: #0f3460;
  padding: 15px;
  border-radius: 15px;
  margin-top: 20px;
}

</style>
</head>

<body>

<header>🎵 أوتار اليمن</header>

<div class="container">

<button onclick="login()">🔐 تسجيل الدخول عبر Pi</button>
<p id="user"></p>

<textarea id="lyrics" placeholder="اكتب كلماتك هنا..."></textarea>

<br>

<select id="maqam">
  <option value="صنعاني">مقام صنعاني</option>
  <option value="لحجي">مقام لحجي</option>
  <option value="عدني">مقام عدني</option>
  <option value="حضرموتي">مقام حضرموتي</option>
</select>

<br>

<button onclick="generateSong()">🎶 تحويل إلى أغنية</button>

<div class="card">
  <h3>🎼 النتيجة</h3>
  <p id="output"></p>
  <button onclick="playSong()">▶ تشغيل الصوت</button>
</div>

</div>

<script>

// Pi Init
Pi.init({ version: "2.0", sandbox: true });

// Login
async function login() {
  try {
    const auth = await Pi.authenticate(['username'], onIncompletePaymentFound);
    document.getElementById("user").innerText = "👤 " + auth.user.username;
  } catch (e) {
    alert("خطأ في تسجيل الدخول");
  }
}

function onIncompletePaymentFound(payment) {
  console.log(payment);
}

// Generate Song
function generateSong() {
  let text = document.getElementById("lyrics").value;
  let maqam = document.getElementById("maqam").value;

  if (!text) {
    alert("اكتب كلمات أولاً");
    return;
  }

  let styled = `🎶 [${maqam}]
${text}

✨ تم تحويل النص إلى نمط غنائي يمني بإيقاع العود`;

  document.getElementById("output").innerText = styled;
}

// Play Song (TTS)
function playSong() {
  let text = document.getElementById("output").innerText;

  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "ar-SA";

  window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
