<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوتار اليمن.HS | الإصدار المستقر</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0b; --card: #161618; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app-wrapper { width: 100%; max-width: 480px; min-height: 100vh; padding-bottom: 50px; }
        .header { padding: 40px 20px; text-align: center; border-bottom: 1px solid #222; }
        .header h1 { color: var(--gold); font-size: 28px; margin: 0; }
        .section-card { background: var(--card); margin: 15px; border-radius: 20px; padding: 20px; border: 1px solid #28282a; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .section-title { font-size: 16px; color: var(--gold); margin-bottom: 15px; font-weight: bold; }
        textarea { width: 100%; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; padding: 15px; font-family: 'Cairo', sans-serif; box-sizing: border-box; font-size: 16px; outline: none; }
        textarea:focus { border-color: var(--gold); }
        .btn-generate { background: linear-gradient(45deg, var(--gold), #f1c40f); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 17px; transition: 0.3s; }
        .btn-generate:active { transform: scale(0.95); }
        .process-log { background: #000; border-radius: 10px; padding: 12px; font-family: monospace; font-size: 11px; color: #00ff00; height: 130px; overflow-y: auto; margin-top: 10px; text-align: right; border: 1px solid #222; line-height: 1.6; }
        .player-box { display: none; margin-top: 15px; background: #222; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); }
        audio { width: 100%; filter: invert(100%); opacity: 0.8; }
        .loader { display: none; border: 3px solid #333; border-top: 3px solid var(--gold); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <h1>أوتار اليمن.HS</h1>
        <p style="color:#888; font-size:12px;">محرك إنتاج الألحان الذكي (V3.0)</p>
    </div>

    <div class="section-card">
        <div class="section-title">🎸 إنتاج اللحن اليمني</div>
        <textarea id="promptArea" rows="3" placeholder="اكتب وصفك (مثلاً: عزف عود صنعاني مبهج)..."></textarea>
        <button id="mainBtn" class="btn-generate" onclick="generateMusic()">توليد اللحن الآن ✨</button>
        <div id="loader" class="loader"></div>
        <div id="logBox" class="process-log">> النظام جاهز وبانتظار أوامرك...</div>
    </div>

    <div class="section-card">
        <div class="section-title">🎧 استوديو الاستماع</div>
        <div id="playerContainer" class="player-box">
            <audio id="mainAudio" controls></audio>
            <p style="text-align: center; color: var(--gold); font-size: 12px; margin-top: 10px;">تم التوليد بنجاح ✅</p>
        </div>
        <p id="retryNotice" style="display:none; text-align:center; font-size:11px; color:#d35400; margin-top:10px;">السيرفر يستعد.. سيتم إعادة المحاولة تلقائياً بعد ثوانٍ</p>
    </div>
</div>

<script>
    const apiKey = "";
    const modelId = "facebook/musicgen-small";

    function addToLog(msg) {
        const log = document.getElementById('logBox');
        log.innerHTML += `<br>> ${msg}`;
        log.scrollTop = log.scrollHeight;
    }

    async function generateMusic() {
        const text = document.getElementById('promptArea').value;
        const btn = document.getElementById('mainBtn');
        const loader = document.getElementById('loader');
        
        if(!text) return alert("يرجى كتابة وصف اللحن");

        btn.disabled = true;
        loader.style.display = "block";
        addToLog("بدء تشغيل المحرك الفني...");

        async function query(data) {
            const response = await fetch(
                `https://api-inference.huggingface.co/models/${modelId}`,
                {
                    headers: { Authorization: `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    method: "POST",
                    body: JSON.stringify(data),
                }
            );
            return response;
        }

        try {
            addToLog("إرسال طلب التوليد للسيرفر العالمي...");
            let response = await query({ inputs: "Yemeni Oud music, traditional folk, " + text });

            // التعامل مع حالة السيرفر نائم (تحميل النموذج)
            if (response.status === 503) {
                addToLog("السيرفر نائم.. جاري إيقاظه (قد يستغرق 20 ثانية)...");
                document.getElementById('retryNotice').style.display = "block";
                
                // إعادة محاولة ذكية بعد 20 ثانية تلقائياً
                setTimeout(async () => {
                    addToLog("إعادة المحاولة الآن...");
                    generateMusic(); 
                }, 20000);
                return;
            }

            if (!response.ok) throw new Error("فشل الاتصال");

            addToLog("تم استلام الموجات الصوتية! جاري المعالجة...");
            const blob = await response.blob();
            const audioUrl = URL.createObjectURL(blob);
            
            const audio = document.getElementById('mainAudio');
            audio.src = audioUrl;
            document.getElementById('playerContainer').style.display = 'block';
            document.getElementById('retryNotice').style.display = "none";
            
            addToLog("العمل جاهز! استمتع بألحان اليمن ✅");
            audio.play();

        } catch (error) {
            addToLog("خطأ في الشبكة.. تأكد من قوة الإنترنت وحاول مجدداً.");
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
