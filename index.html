<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوتار اليمن.HS | الإصدار المستقر</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0b; --card: #161618; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app-wrapper { width: 100%; max-width: 480px; min-height: 100vh; padding-bottom: 50px; }
        .header { padding: 40px 20px; text-align: center; border-bottom: 1px solid #222; }
        .header h1 { color: var(--gold); font-size: 28px; margin: 0; }
        .section-card { background: var(--card); margin: 15px; border-radius: 20px; padding: 20px; border: 1px solid #28282a; }
        .section-title { font-size: 16px; color: var(--gold); margin-bottom: 15px; font-weight: bold; }
        textarea { width: 100%; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; padding: 15px; font-family: 'Cairo', sans-serif; box-sizing: border-box; font-size: 16px; }
        .btn-generate { background: linear-gradient(45deg, var(--gold), #f1c40f); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }
        .process-log { background: #000; border-radius: 10px; padding: 12px; font-family: monospace; font-size: 11px; color: #00ff00; height: 120px; overflow-y: auto; margin-top: 10px; text-align: right; border: 1px solid #222; }
        .player-box { display: none; margin-top: 15px; background: #222; padding: 10px; border-radius: 10px; }
        audio { width: 100%; filter: invert(100%); }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <h1>أوتار اليمن.HS</h1>
        <p style="color:#888; font-size:12px;">نظام تجاوز القيود والإنتاج الفوري</p>
    </div>

    <div class="section-card">
        <div class="section-title">🎸 إنتاج لحن يمني (عبر الوسيط)</div>
        <textarea id="promptArea" rows="3" placeholder="مثال: لحن عود يمني تراثي هادئ..."></textarea>
        <button class="btn-generate" onclick="generateMusic()">توليد اللحن الآن ✨</button>
        <div id="logBox" class="process-log">> بانتظار أمر البدء...</div>
    </div>

    <div class="section-card">
        <div class="section-title">🎧 الاستماع للعمل</div>
        <div id="playerContainer" class="player-box">
            <audio id="mainAudio" controls></audio>
        </div>
        <p style="text-align:center; font-size:10px; color:#555; margin-top:10px;">إذا استمر الخطأ، يرجى المحاولة بعد 10 ثوانٍ</p>
    </div>
</div>

<script>
    const apiKey = "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";

    function addToLog(msg) {
        const log = document.getElementById('logBox');
        log.innerHTML += `<br>> ${msg}`;
        log.scrollTop = log.scrollHeight;
    }

    async function generateMusic() {
        const text = document.getElementById('promptArea').value;
        if(!text) return alert("يرجى كتابة وصف اللحن");

        addToLog("جاري محاولة الاتصال عبر النفق البرمجي...");
        
        try {
            // استخدام وكيل CORS لتجاوز حظر المتصفحات
            const proxyUrl = "https://cors-anywhere.herokuapp.com/"; // رابط وسيط
            const targetUrl = "https://api-inference.huggingface.co/models/facebook/musicgen-small";

            const response = await fetch(targetUrl, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${apiKey}`,
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ inputs: "Traditional Yemeni music, Oud instrument, " + text }),
            });

            if (response.status === 503) {
                addToLog("السيرفر يستعد.. انتظر 15 ثانية واضغط الزر مرة أخرى ⏳");
                return;
            }

            if (!response.ok) throw new Error("السيرفر رفض الطلب");

            addToLog("نجح الاتصال! جاري تحميل اللحن المولد...");
            const blob = await response.blob();
            const audioUrl = URL.createObjectURL(blob);
            
            const audio = document.getElementById('mainAudio');
            audio.src = audioUrl;
            document.getElementById('playerContainer').style.display = 'block';
            addToLog("تم الإنتاج بنجاح! استمع الآن ✅");
            audio.play();

        } catch (error) {
            addToLog("عذراً، لا زال هناك قيود في الشبكة. جرب الضغط مرة أخرى أو استخدام متصفح Pi.");
        }
    }
</script>
</body>
</html>
