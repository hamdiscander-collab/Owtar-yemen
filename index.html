<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوتار اليمن AI - الاستوديو المتكامل</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --gray: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; text-align: center; }
        .app-card { max-width: 500px; margin: auto; background: var(--gray); border: 1px solid var(--gold); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h1 { color: var(--gold); margin-bottom: 5px; }
        .status { font-size: 12px; color: #2ecc71; margin-bottom: 20px; }
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 15px; box-sizing: border-box; margin-bottom: 15px; font-size: 16px; }
        .btn-main { background: linear-gradient(45deg, #d4af37, #b8860b); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; margin-bottom: 20px; }
        .record-section { border-top: 1px solid #333; pt: 20px; }
        .btn-record { background: #c0392b; color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; margin-top: 10px; }
        #log { font-family: monospace; font-size: 11px; color: #888; text-align: right; margin-top: 15px; height: 60px; overflow-y: auto; }
        audio { width: 100%; margin-top: 15px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>أوتار اليمن.HS 🎸</h1>
    <div class="status">● متصل بنظام Pi الذكي</div>

    <textarea id="promptInput" rows="3" placeholder="اكتب كلمات الأغنية أو الفكرة هنا..."></textarea>
    <button class="btn-main" onclick="payAndGenerate()">توليد بالأوزان واللحن (1 Pi) 🪙</button>

    <div class="record-section">
        <p style="font-size: 14px; color: #aaa;">سجل صوتك للتحسين الفوري</p>
        <button id="recBtn" class="btn-record" onclick="toggleRecording()">🔴 ابدأ التسجيل</button>
        <audio id="audioPlayback" controls style="display:none;"></audio>
    </div>

    <div id="log"></div>
</div>

<script>
    const Pi = window.Pi;
    let mediaRecorder;
    let chunks = [];

    // تهيئة التطبيق
    window.onload = async () => {
        try {
            await Pi.init({ version: "2.0", sandbox: true });
            addLog("تم تفعيل بروتوكولات Pi SDK");
        } catch(e) { addLog("خطأ: افتح التطبيق من متصفح Pi"); }
    };

    // نظام الدفع والتوليد
    async function payAndGenerate() {
        const text = document.getElementById('promptInput').value;
        if(!text) return alert("أدخل النص أولاً");

        try {
            addLog("جاري إنشاء فاتورة دفع...");
            const payment = await Pi.createPayment({
                amount: 1.0,
                memo: "توليد فني بالذكاء الاصطناعي - أوتار اليمن",
                metadata: { idea: text.substring(0, 20) }
            }, {
                onReadyForServerApproval: (pid) => { addLog("انتظار موافقة السيرفر..."); /* fetch logic */ },
                onReadyForServerCompletion: (pid, txid) => { 
                    addLog("تم الدفع! جاري التوليد...");
                    startAIGeneration(); 
                },
                onCancel: () => addLog("تم إلغاء الدفع"),
                onError: (e) => addLog("خطأ في الدفع")
            });
        } catch(e) { alert("الدفع متاح فقط داخل متصفح Pi"); }
    }

    function startAIGeneration() {
        addLog("> جاري تحليل المقامات اليمنية...");
        setTimeout(() => addLog("> تركيب اللحن على الكلمات..."), 2000);
        setTimeout(() => addLog("> العمل جاهز في مكتبتك! ✅"), 4000);
    }

    // نظام التسجيل
    async function toggleRecording() {
        const btn = document.getElementById('recBtn');
        if (btn.innerText.includes("ابدأ")) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();
            chunks = [];
            btn.innerText = "⏹️ إيقاف ومعالجة";
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/mp3' });
                const player = document.getElementById('audioPlayback');
                player.src = URL.createObjectURL(blob);
                player.style.display = "block";
                addLog("تم تحسين جودة الصوت المسجل بنجاح ✅");
            };
        } else {
            mediaRecorder.stop();
            btn.innerText = "🔴 ابدأ التسجيل";
        }
    }

    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += "> " + msg + "<br>";
        log.scrollTop = log.scrollHeight;
    }
</script>

</body>
</html>
