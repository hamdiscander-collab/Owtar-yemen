<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أوتار اليمن | الاستوديو الذكي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0A0A0B; --card: #161618; --accent: #00FF9D; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--dark); color: white; padding: 15px; }
        .app-shell { max-width: 500px; margin: auto; }
        .studio-card { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #222; }
        textarea { width: 100%; background: #000; border: 1px solid #333; border-radius: 15px; color: #fff; padding: 15px; margin: 15px 0; }
        .btn-main { background: var(--gold); color: #000; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; }
        .player-panel { display: none; background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid var(--gold); margin-top: 20px; text-align: center; }
        audio { width: 100%; margin: 15px 0; filter: invert(1); }
        .console { background: #000; border-radius: 15px; padding: 15px; font-size: 11px; color: var(--accent); height: 100px; overflow-y: auto; margin-top: 15px; }
    </style>
</head>
<body>

<div class="app-shell">
    <header style="text-align:center; padding:20px;">
        <div style="font-size:24px; font-weight:900; color:var(--gold);">أوتار اليمن.HS</div>
        <div id="userGreeting" style="font-size:12px; color:var(--accent);">جاري التحميل...</div>
    </header>

    <main class="studio-card">
        <textarea id="promptIn" rows="3" placeholder="اكتب وصف اللحن هنا..."></textarea>
        <button id="execBtn" class="btn-main" onclick="processAll()">إنتاج العمل الفني ✨</button>
        <div id="lyricsDisplay" style="display:none; margin-top:15px; color:#ccc; font-size:14px; border-right:3px solid var(--gold); padding-right:10px;"></div>
        <div id="statusLog" class="console">> بانتظار تهيئة النظام...</div>
    </main>

    <section id="playerBox" class="player-panel">
        <audio id="audioMaster" controls></audio>
        <button onclick="saveToPhone()" style="width:100%; background:none; border:1px solid var(--gold); color:var(--gold); padding:10px; border-radius:10px; margin-top:10px;">حفظ في الهاتف</button>
    </section>
</div>

<script>
    const log = (msg) => {
        const con = document.getElementById('statusLog');
        con.innerHTML += `<br>> ${msg}`;
        con.scrollTop = con.scrollHeight;
    };

    // تأخير التهيئة لضمان تحميل المكتبة
    window.onload = function() {
        if (window.Pi) {
            window.Pi.init({ version: "1.5", sandbox: true });
            authenticateUser();
        } else {
            log("خطأ: لم يتم تحميل مكتبة Pi SDK");
        }
    };

    async function authenticateUser() {
        try {
            const auth = await window.Pi.authenticate(['username'], (p) => {});
            document.getElementById('userGreeting').innerText = `مرحباً، ${auth.user.username}`;
            log("تم الاتصال بـ Pi Network بنجاح ✅");
        } catch (err) {
            log("فشل المصادقة: " + err.message);
        }
    }

    async function processAll() {
        const prompt = document.getElementById('promptIn').value;
        const btn = document.getElementById('execBtn');
        if(!prompt) return alert("يرجى كتابة وصف");

        btn.disabled = true;
        log("بدء توليد اللحن (قد يستغرق 30 ثانية)...");

        try {
            const response = await fetch('https://owtar-yemen5.onrender.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            if (!response.ok) throw new Error("السيرفر لا يستجيب حالياً");

            const blob = await response.blob();
            if (blob.size < 1000) throw new Error("ملف الصوت فارغ - تأكد من مفتاح Hugging Face");

            const url = URL.createObjectURL(blob);
            const audio = document.getElementById('audioMaster');
            audio.src = url;
            document.getElementById('playerBox').style.display = 'block';
            log("تم التوليد بنجاح! اضغط تشغيل.");
            audio.play().catch(() => log("يرجى الضغط على زر التشغيل يدوياً"));

        } catch (err) {
            log("خطأ: " + err.message);
        } finally {
            btn.disabled = false;
        }
    }

    function saveToPhone() {
        const a = document.createElement('a');
        a.href = document.getElementById('audioMaster').src;
        a.download = "Owtar_Yemen.mp3";
        a.click();
    }
</script>
</body>
</html>
