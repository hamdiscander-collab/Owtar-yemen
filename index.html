<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أوتار اليمن.HS | الاستوديو السحابي الاحترافي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <style>
        /* --- المتغيرات والتأسيس --- */
        :root {
            --gold-primary: #d4af37;
            --gold-secondary: #f1c40f;
            --deep-black: #050505;
            --card-bg: #121214;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --accent-green: #00ff88;
            --text-main: #e0e0e0;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--deep-black);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.05), transparent),
                              radial-gradient(circle at bottom left, rgba(212, 175, 55, 0.05), transparent);
        }

        /* --- واجهة التحميل الذكية --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--deep-black);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }

        .loader-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 30px;
            color: var(--gold-primary);
            letter-spacing: 5px;
            animation: pulse 2s infinite;
        }

        /* --- الحاوية الرئيسية --- */
        .main-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- الهيدر الاحترافي --- */
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            margin-bottom: 20px;
        }

        .brand-title {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(to right, #fff, var(--gold-primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .brand-badge {
            display: inline-block;
            background: var(--gold-primary);
            color: #000;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: bold;
            vertical-align: middle;
            margin-top: -10px;
        }

        /* --- بطاقات التحكم --- */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
            transition: 0.5s;
        }

        .glass-card:hover::before { left: 100%; }

        .section-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gold-primary);
            font-weight: 700;
            margin-bottom: 20px;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* --- مدخلات النصوص --- */
        .prompt-wrapper {
            position: relative;
            background: #000;
            border-radius: 20px;
            padding: 5px;
            border: 1px solid #222;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            padding: 15px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            resize: none;
            outline: none;
            min-height: 100px;
        }

        /* --- أزرار الإنتاج --- */
        .btn-produce {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-secondary));
            color: #000;
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            transition: var(--transition);
        }

        .btn-produce:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }

        .btn-produce:disabled {
            background: #333;
            color: #777;
            cursor: not-allowed;
            transform: none;
        }

        /* --- سجل العمليات (Terminal) --- */
        .terminal-box {
            background: #000;
            border-radius: 15px;
            padding: 15px;
            font-family: 'monospace';
            font-size: 12px;
            color: var(--accent-green);
            height: 150px;
            overflow-y: auto;
            border: 1px solid #1a1a1a;
            margin-top: 15px;
        }

        .log-line {
            margin-bottom: 5px;
            border-right: 2px solid var(--accent-green);
            white-space: nowrap;
            overflow: hidden;
            animation: typing 2s steps(40, end), blink .75s step-end infinite;
        }

        /* --- مشغل الموسيقى الملكي --- */
        .player-container {
            display: none;
            animation: slideUp 0.8s ease;
        }

        .audio-visualizer {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            margin-bottom: 20px;
        }

        .bar {
            width: 4px;
            background: var(--gold-primary);
            border-radius: 10px;
            animation: equalize 1s infinite;
        }

        audio {
            width: 100%;
            height: 50px;
            filter: invert(1) hue-rotate(180deg) brightness(1.5);
            border-radius: 50px;
        }

        /* --- فوتر --- */
        footer {
            margin-top: auto;
            padding: 40px 0;
            text-align: center;
            font-size: 12px;
            color: #555;
        }

        /* --- Animations --- */
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes equalize {
            0%, 100% { height: 10px; }
            50% { height: 40px; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تنبيهات الهواتف */
        @media (max-width: 400px) {
            .brand-title { font-size: 24px; }
            .glass-card { padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="loader-logo">OWTAR AI</div>
        <p style="color: #444; font-size: 10px; margin-top: 20px;">INITIALIZING CORE SYSTEMS...</p>
    </div>

    <div class="main-container">
        
        <header>
            <h1 class="brand-title">أوتار اليمن.HS <span class="brand-badge">PRO v3</span></h1>
            <p style="color: #666; font-size: 11px; margin-top: 8px; letter-spacing: 2px;">YEMENI MUSICAL AI ENGINE</p>
        </header>

        <main class="glass-card">
            <div class="section-label">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span>مختبر التوليد الذكي</span>
            </div>

            <div class="prompt-wrapper">
                <textarea id="mainPrompt" placeholder="صف اللحن الذي تتخيله.. (مثال: تقاسيم عود صنعاني هادئة على مقام البيات بمشاعر حزينة)"></textarea>
            </div>

            <button id="actionBtn" class="btn-produce" onclick="initiateProduction()">
                <span>بدء الإنتاج الفني</span>
                <i class="fa-solid fa-play"></i>
            </button>

            <div id="terminal" class="terminal-box">
                <div class="log-line">> نظام استوديو أوتار جاهز للعمل...</div>
                <div class="log-line">> بانتظار إدخال البيانات الوصفية...</div>
            </div>
        </main>

        <section id="resultPanel" class="glass-card player-container">
            <div class="section-label">
                <i class="fa-solid fa-headphones-simple"></i>
                <span>الإخراج النهائي للعمل</span>
            </div>

            <div class="audio-visualizer" id="visualizer">
                </div>

            <audio id="audioMaster" controls></audio>
            
            <button class="btn-produce" style="background: transparent; border: 1px solid var(--gold-primary); color: var(--gold-primary); margin-top: 15px;" onclick="downloadWork()">
                <i class="fa-solid fa-download"></i>
                <span>تصدير الملف للهاتف</span>
            </button>
        </section>

        <footer>
            <p>جميع الحقوق محفوظة © 2026</p>
            <p>تطوير: أوتار اليمن | مدعوم بـ Vercel & Hugging Face</p>
        </footer>

    </div>

    <script>
        // --- تهيئة النظام ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                }, 1000);
            }, 2000);
            createVisualizerBars();
        });

        function createVisualizerBars() {
            const viz = document.getElementById('visualizer');
            for(let i=0; i<30; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.animationDelay = `${Math.random() * 2}s`;
                viz.appendChild(bar);
            }
        }

        function pushLog(msg, type = 'info') {
            const term = document.getElementById('terminal');
            const line = document.createElement('div');
            line.className = 'log-line';
            const timestamp = new Date().toLocaleTimeString();
            line.innerHTML = `<span style="color:#444">[${timestamp}]</span> > ${msg}`;
            term.appendChild(line);
            term.scrollTop = term.scrollHeight;
        }

        // --- محرك التوليد الرئيسي ---
        async function initiateProduction() {
            const prompt = document.getElementById('mainPrompt').value;
            const btn = document.getElementById('actionBtn');
            const panel = document.getElementById('resultPanel');

            if(!prompt) {
                pushLog("خطأ: يرجى كتابة وصف للعمل الفني!", "error");
                return;
            }

            // تحديث الواجهة لبدء الإنتاج
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> جاري الإنتاج...`;
            panel.style.display = 'none';

            pushLog("جاري تشغيل محركات الذكاء الاصطناعي...");
            pushLog("تحليل الأوزان والمقامات المطلوبة...");
            
            try {
                // محاولة أولى للاتصال بالجسر
                const result = await attemptFetch(prompt);
                
                if(result.status === 503) {
                    pushLog("تنبيه: السيرفر نائم.. جاري عملية الإيقاظ التلقائي (30 ثانية)...");
                    await countdown(30);
                    return initiateProduction(); // إعادة المحاولة تلقائياً
                }

                if(!result.ok) throw new Error("فشل في الربط مع السيرفر");

                pushLog("تم استقبال الموجات الصوتية بنجاح ✅");
                pushLog("جاري معالجة الصوت والفلترة النهائية...");

                const blob = await result.blob();
                const url = URL.createObjectURL(blob);
                const master = document.getElementById('audioMaster');
                master.src = url;
                
                panel.style.display = 'block';
                master.play();
                pushLog("اكتمل العمل الفني! جاهز للاستماع والتصدير.");

            } catch (err) {
                pushLog("خطأ فني: " + err.message);
                pushLog("تأكد من إعدادات Vercel ومفتاح HF_TOKEN.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>إنتاج عمل جديد</span> <i class="fa-solid fa-rotate-right"></i>`;
            }
        }

        // دالة المساعدة للاتصال
        async function attemptFetch(promptText) {
            return await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptText })
            });
        }

        // دالة العد التنازلي للتنبه
        function countdown(seconds) {
            return new Promise(resolve => {
                let current = seconds;
                const timer = setInterval(() => {
                    pushLog(`إعادة المحاولة خلال ${current} ثانية...`);
                    current--;
                    if(current < 0) {
                        clearInterval(timer);
                        resolve();
                    }
                }, 1000);
            });
        }

        function downloadWork() {
            const src = document.getElementById('audioMaster').src;
            if(!src) return;
            const a = document.createElement('a');
            a.href = src;
            a.download = `Owtar_AI_Studio_${Date.now()}.mp3`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
