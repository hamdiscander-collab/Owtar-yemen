<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوتار اليمن - استوديو الذكاء الاصطناعي</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0d1b2a;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            margin-top: 50px;
            border: 1px solid #c9ada7;
            padding: 20px;
            border-radius: 15px;
        }
        .btn {
            background-color: #e09f3e;
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #status { color: #8ecae6; margin-top: 10px; }
        footer { margin-top: 30px; font-size: 0.8em; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="container">
        <h1>أوتار اليمن 🎸</h1>
        <p>استوديو تحويل النص إلى أغاني بالعود اليمني</p>
        
        <div id="user-info">
            <p>مرحباً بك في عالم الفن اليمني الأصيل</p>
        </div>

        <button class="btn" onclick="startStudio()">ابدأ الإنتاج الآن</button>
        <p id="status">جاري الاتصال بـ Pi Network...</p>
    </div>

    <footer>
        تطوير: hamdiscander &copy; 2026
    </footer>

    <script>
        // 1. تهيئة الـ SDK
        const Pi = window.Pi;
        
        try {
            // ملاحظة: sandbox: true ضرورية جداً في مرحلة التجربة لمنع الصفحة البيضاء
            Pi.init({ version: "2.0", sandbox: true });
            document.getElementById('status').innerText = "متصل بشبكة Pi ✅";

            // 2. طلب تسجيل الدخول (Authentication)
            // هذا يضمن أن التطبيق لا يفتح إلا لمستخدمي Pi
            const scopes = ['username', 'payments'];
            
            function onIncompletePaymentFound(payment) {
                console.log("هناك عملية دفع معلقة:", payment);
            };

            Pi.authenticate(scopes, onIncompletePaymentFound).then(function(auth) {
                console.log("تم تسجيل الدخول بنجاح:", auth.user.username);
                document.getElementById('user-info').innerHTML = `<p>أهلاً يا <strong>${auth.user.username}</strong>، استوديو العود جاهز لك.</p>`;
            }).catch(function(error) {
                console.error("خطأ في تسجيل الدخول:", error);
                document.getElementById('status').innerText = "يرجى فتح التطبيق من متصفح Pi Browser.";
            });

        } catch (err) {
            console.error("فشل تهيئة SDK:", err);
            document.getElementById('status').innerText = "خطأ في الاتصال بالشبكة.";
        }

        function startStudio() {
            alert("تم تفعيل استوديو أوتار اليمن! جاهز لتحويل النص إلى لحن عود.");
        }
    </script>
</body>
</html>
