<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Owtar Yemen</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

header{
background:linear-gradient(135deg,#6d28d9,#2563eb);
padding:20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

header h1{
font-size:32px;
}

header p{
margin-top:10px;
opacity:0.9;
}

.login-section{
display:flex;
justify-content:center;
margin-top:30px;
}

.login-btn{
background:#7c3aed;
border:none;
padding:16px 30px;
font-size:20px;
color:white;
border-radius:18px;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

#status{
text-align:center;
margin-top:20px;
font-size:18px;
}

#app{
display:none;
padding:20px;
}

.welcome{
text-align:center;
margin-bottom:25px;
}

.search-box{
text-align:center;
margin-bottom:25px;
}

.search-box input{
width:95%;
max-width:500px;
padding:14px;
border:none;
border-radius:14px;
font-size:18px;
outline:none;
}

.upload-box{
text-align:center;
margin-bottom:25px;
}

.upload-box input{
margin-top:10px;
}

.songs-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.song-card{
background:#1e293b;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.25);
transition:0.3s;
}

.song-card:hover{
transform:translateY(-5px);
}

.song-card img{
width:100%;
height:220px;
object-fit:cover;
}

.song-info{
padding:15px;
}

.song-info h3{
margin-bottom:8px;
}

.song-info p{
color:#cbd5e1;
margin-bottom:12px;
}

audio{
width:100%;
}

footer{
text-align:center;
padding:25px;
margin-top:40px;
color:#94a3b8;
}

</style>
</head>

<body>

<header>

<h1>🎵 Owtar Yemen</h1>

<p>
الموسيقى اليمنية الأصيلة داخل شبكة Pi
</p>

</header>

<div class="login-section">

<button class="login-btn" onclick="loginPi()">

🔐 تسجيل الدخول بـ Pi

</button>

</div>

<div id="status"></div>

<div id="app">

<div class="welcome">

<h2 id="welcomeText"></h2>

<p>
استمتع بأجمل الأغاني اليمنية والتراث الأصيل
</p>

</div>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="ابحث عن أغنية أو فنان..."
onkeyup="searchSongs()"
>

</div>

<div class="upload-box">

<h3>📤 إضافة أغنية من جهازك</h3>

<input
type="file"
accept="audio/*"
onchange="uploadSong(event)"
>

</div>

<div class="songs-grid" id="songsContainer">

<div class="song-card">

<img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f">

<div class="song-info">

<h3>عود يمني تراثي</h3>

<p>جلسة يمنية هادئة</p>

<audio controls>

<source
src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
type="audio/mpeg">

</audio>

</div>

</div>

<div class="song-card">

<img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4">

<div class="song-info">

<h3>أنغام صنعانية</h3>

<p>فن يمني أصيل</p>

<audio controls>

<source
src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
type="audio/mpeg">

</audio>

</div>

</div>

<div class="song-card">

<img src="https://images.unsplash.com/photo-1507838153414-b4b713384a76">

<div class="song-info">

<h3>جلسة حضرمية</h3>

<p>إيقاعات يمنية شعبية</p>

<audio controls>

<source
src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
type="audio/mpeg">

</audio>

</div>

</div>

</div>

</div>

<footer>

© Owtar Yemen

</footer>

<script>

Pi.init({
version: "2.0"
});

async function loginPi(){

document.getElementById("status").innerHTML =
"⏳ جاري تسجيل الدخول...";

try{

const scopes = ['username','payments'];

const auth = await Pi.authenticate(
scopes,
onIncompletePaymentFound
);

document.getElementById("status").innerHTML =
"✅ تم تسجيل الدخول";

document.getElementById("welcomeText").innerHTML =
"أهلاً " + auth.user.username + " 👋";

document.getElementById("app").style.display = "block";

}catch(err){

console.error(err);

document.getElementById("status").innerHTML =
"❌ فشل تسجيل الدخول";

}

}

function onIncompletePaymentFound(payment){

console.log(payment);

}

function searchSongs(){

let input =
document.getElementById("searchInput")
.value.toLowerCase();

let cards =
document.getElementsByClassName("song-card");

for(let i=0;i<cards.length;i++){

let text =
cards[i].innerText.toLowerCase();

if(text.includes(input)){

cards[i].style.display="block";

}else{

cards[i].style.display="none";

}

}

}

function uploadSong(event){

const file = event.target.files[0];

if(!file) return;

const audioURL = URL.createObjectURL(file);

const container =
document.getElementById("songsContainer");

const newSong = document.createElement("div");

newSong.className = "song-card";

newSong.innerHTML = `

<img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81">

<div class="song-info">

<h3>${file.name}</h3>

<p>أغنية مضافة من المستخدم</p>

<audio controls>

<source src="${audioURL}" type="audio/mpeg">

</audio>

</div>

`;

container.prepend(newSong);

}

</script>

</body>
</html>
