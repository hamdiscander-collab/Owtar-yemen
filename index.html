<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوتار اليمن.HS | استوديو الذكاء الاصطناعي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0b; --card-bg: #161618; --text-gray: #a0a0a0; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app-wrapper { width: 100%; max-width: 480px; background: var(--dark-bg); min-height: 100vh; padding-bottom: 50px; }
        .header { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, #1a1a1c, var(--dark-bg)); border-bottom: 1px solid #222; }
        .header h1 { color: var(--gold); font-size: 28px; margin: 0; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .section-card { background: var(--card-bg); margin: 15px; border-radius: 20px; padding: 20px; border: 1px solid #28282a; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .section-title { font-size: 16px; color: var(--gold); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        textarea { width: 100%; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; padding: 15px; font-family: 'Cairo', sans-serif; resize: none; box-sizing: border-box; font-size: 15px; }
        textarea:focus { border-color: var(--gold); outline: none; }
        .btn-generate { background: linear-gradient(45deg, var(--gold), #f1c40f); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; transition: 0.3s; }
        .btn-generate:active { transform: scale(0.95); }
        .record-circle { width: 70px; height: 70px; border-radius: 50%; background: #c0392b; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; cursor: pointer; transition: 0.3s; }
        .record-circle.active { animation: pulse 1.5s infinite; background: #e74c3c; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); } 100% { transform: scale(1); } }
        .process-log { background: #000; border-radius: 10px; padding: 12px; font-family: monospace; font-size: 11px; color: #00ff00; height: 100px; overflow-y: auto; margin-top: 10px; text-align: right; border: 1px solid #222; }
        .player-box { display: none; margin-top: 15px; background: #222; padding: 10px; border-radius: 10px; }
        audio { width: 100%; filter: invert(100%); }
        .footer { text-align: center; color: #444; font-size: 11px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <h1>أوتار اليمن.HS</h1>
        <p style="color: #888; font-size: 12px;">استوديو توليد الألحان بالذكاء الاصطناعي</p>
    </div>

    <div class="section-card">
        <div class="section-title">✍️ تأليف وتحويل النص إلى لحن</div>
        <textarea id="promptArea" rows="3" placeholder="مثال: عزف عود صنعاني حزين بمقام الراست..."></textarea>
        <button class="btn-generate" onclick="generateMusic()">إنتاج العمل الفني ✨</button>
        <div id="logBox" class="process-log">> بانتظار أوامر الاستوديو...</div>
    </div>

    <div class="section-card">
        <div class="section-title">🎤 استوديو التسجيل والمعالجة</div>
        <div id="recordBtn" class="record-circle" onclick="toggleMic()">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
        <p id="recStatus" style="text-align: center; font-size: 12px; color: #888;">اضغط للتسجيل</p>
        <div id="playerContainer" class="player-box">
            <audio id="mainAudio" controls></audio>
        </div>
    </div>

    <div class="footer">
        مدعوم بتقنيات Hugging Face & Pi Network<br>
        2026 © جميع الحقوق محفوظة
    </div>
</div>

<script>
    const Pi = window.Pi;
    let mediaRecorder;
    let audioChunks = [];

    // التوكن الخاص بك تم دمجه هنا بأمان
    const apiKey = "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"; 

    window.onload = () => { try { Pi.init({ version: "2.0", sandbox: true }); } catch(e) {} };

    function addToLog(msg) {
        const log = document.getElementById('logBox');
        log.innerHTML += `<br>> ${msg}`;
        log.scrollTop = log.scrollHeight;
    }

    async function generateMusic() {
        const text = document.getElementById('promptArea').value;
        if(!text) { alert("من فضلك اكتب النص أولاً"); return; }
        
        addToLog("جاري فتح قناة الاتصال مع السيرفر... 📡");

        try {
            const response = await fetch(
                "https://api-inference.huggingface.co/models/facebook/musicgen-small",
                {
                    headers: { 
                        "Authorization": `Bearer ${apiKey}`, 
                        "Content-Type": "application/json" 
                    },
                    method: "POST",
                    body: JSON.stringify({ "inputs": "Yemeni traditional music, Oud instrument, " + text }),
                }
            );

            if (!response.ok) {
                const err = await response.json();
                if (err.error && err.error.includes("loading")) {
                    addToLog("تنبيه: السيرفر يستيقظ حالياً.. حاول مجدداً بعد 10 ثوانٍ ⏳");
                } else { 
                    addToLog("خطأ: " + err.error);
                }
                return;
            }

            addToLog("الذكاء الاصطناعي يقوم بتأليف اللحن الآن... 🎸");
            const blob = await response.blob();
            const audioUrl = URL.createObjectURL(blob);
            const audio = document.getElementById('mainAudio');
            audio.src = audioUrl;
            document.getElementById('playerContainer').style.display = 'block';
            audio.play();
            addToLog("اكتمل التوليد الحقيقي بنجاح! ✅");

        } catch (error) {
            addToLog("حدث خطأ في الشبكة. تأكد من اتصالك.");
        }
    }

    async function toggleMic() {
        const btn = document.getElementById('recordBtn');
        const status = document.getElementById('recStatus');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();
            audioChunks = [];
            btn.classList.add('active');
            status.innerText = "جاري التسجيل...";
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioUrl = URL.createObjectURL(new Blob(audioChunks));
                document.getElementById('mainAudio').src = audioUrl;
                document.getElementById('playerContainer').style.display = 'block';
                status.innerText = "تم الحفظ";
            };
        } else {
            mediaRecorder.stop();
            btn.classList.remove('active');
        }
    }
</script>
</body>
</html>
