<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوتار اليمن.HS | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; --card: #121214; }
        body { background: var(--dark); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 15px; text-align: center; }
        .app-card { max-width: 500px; margin: auto; background: var(--card); border: 1px solid #222; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--gold); font-size: 24px; margin-bottom: 20px; }
        textarea { width: 100%; background: #000; border: 1px solid #333; border-radius: 15px; color: #fff; padding: 15px; font-family: 'Cairo'; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .btn-main { background: var(--gold); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 16px; }
        .terminal { background: #000; border: 1px solid #1a1a1a; border-radius: 10px; padding: 10px; height: 100px; overflow-y: auto; font-family: monospace; font-size: 11px; color: #00ff88; margin-top: 15px; text-align: right; }
        .player { display: none; margin-top: 20px; padding: 15px; border: 1px solid var(--gold); border-radius: 15px; }
        audio { width: 100%; filter: invert(1); }
    </style>
</head>
<body>

<div class="app-card">
    <h1>أوتار اليمن.HS 🎸</h1>
    <textarea id="promptInput" rows="3" placeholder="وصف اللحن (مثال: عود صنعاني)..."></textarea>
    <button id="btn" class="btn-main" onclick="produce()">بدء الإنتاج الذكي ✨</button>
    <div id="logs" class="terminal">> الاستوديو جاهز...</div>
    <div id="playerBox" class="player">
        <audio id="audioOut" controls></audio>
    </div>
</div>

<script>
    function addLog(msg) {
        const logs = document.getElementById('logs');
        logs.innerHTML += `<br>> ${msg}`;
        logs.scrollTop = logs.scrollHeight;
    }

    async function produce() {
        const prompt = document.getElementById('promptInput').value;
        const btn = document.getElementById('btn');
        if(!prompt) return;

        btn.disabled = true;
        addLog("جاري استدعاء الرمز الآمن Good...");

        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            if (response.status === 503) {
                addLog("السيرفر يستعد.. سأحاول مجدداً بعد ثوانٍ ⏳");
                setTimeout(produce, 15000);
                return;
            }

            if (!response.ok) throw new Error();

            addLog("تم التوليد بنجاح! جاري تحميل اللحن...");
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const audio = document.getElementById('audioOut');
            audio.src = url;
            document.getElementById('playerBox').style.display = 'block';
            audio.play();
            addLog("اكتمل العمل ✅");

        } catch (e) {
            addLog("خطأ: تأكد من مفتاح Good في Vercel وعمل Redeploy.");
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
