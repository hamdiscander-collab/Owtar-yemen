<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أوتار اليمن | الاستوديو الذكي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <style>
        :root { --gold: #D4AF37; --dark: #0A0A0B; --card: #161618; --accent: #00FF9D; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { background: var(--dark); color: white; padding: 15px; }

        .app-shell { max-width: 500px; margin: auto; }

        /* الهيدر */
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .logo { font-size: 24px; font-weight: 900; color: var(--gold); letter-spacing: 2px; }

        /* منطقة الإدخال */
        .studio-card { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #222; margin-bottom: 20px; }
        textarea { width: 100%; background: #000; border: 1px solid #333; border-radius: 15px; color: #fff; padding: 15px; font-size: 16px; outline: none; resize: none; margin: 15px 0; }
        
        .btn-main { background: var(--gold); color: #000; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-main:disabled { background: #333; color: #666; cursor: wait; }

        /* عرض كلمات الأغنية */
        #lyricsDisplay { display: none; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; border-right: 3px solid var(--gold); margin-top: 15px; font-size: 14px; line-height: 1.8; color: #ccc; }

        /* المشغل (يظهر فقط عند النجاح) */
        .player-panel { display: none; background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid var(--gold); text-align: center; animation: fadeInUp 0.5s; }
        audio { width: 100%; margin: 15px 0; filter: invert(1); }

        .btn-download { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; border-radius: 10px; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }

        /* سجل العمليات */
        .console { background: #000; border-radius: 15px; padding: 15px; font-family: monospace; font-size: 11px; color: var(--accent); height: 100px; overflow-y: auto; margin-top: 15px; border: 1px solid #111; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ميزة تعديل الملفات الخارجية */
        .file-upload { margin-top: 20px; padding: 15px; border: 1px dashed #444; border-radius: 15px; text-align: center; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="app-shell">
    <header>
        <div class="logo">أوتار اليمن.HS</div>
        <p style="font-size: 10px; color: #555;">الاستوديو الذكي المتكامل - AI Cloud</p>
    </header>

    <main class="studio-card">
        <label style="font-size: 13px; color: var(--gold);">ماذا تريد أن نصنع اليوم؟</label>
        <textarea id="promptIn" rows="3" placeholder="مثال: لحن عود صنعاني مبهج.. واكتب لي كلمات عن الغربة"></textarea>
        
        <button id="execBtn" class="btn-main" onclick="processAll()">إنتاج اللحن والكلمات ✨</button>

        <div id="lyricsDisplay"></div>
        
        <div id="statusLog" class="console">> نظام أوتار جاهز...</div>
    </main>

    <section id="playerBox" class="player-panel">
        <p style="color: var(--gold); font-weight: bold; font-size: 14px;">تم الإنتاج بنجاح! استمع الآن:</p>
        <audio id="audioMaster" controls></audio>
        <br>
        <button class="btn-download" onclick="saveToPhone()">
            <i class="fa-solid fa-cloud-arrow-down"></i> حفظ المقطع في الهاتف
        </button>
    </section>

    <div class="file-upload">
        <i class="fa-solid fa-file-audio" style="font-size: 20px; margin-bottom: 10px;"></i><br>
        تطوير ملف صوتي خارجي (قريباً)
    </div>
</div>

<script>
    function log(msg) {
        const con = document.getElementById('statusLog');
        con.innerHTML += `<br>> ${msg}`;
        con.scrollTop = con.scrollHeight;
    }

    // دالة محاكاة لكلمات الأغنية بالذكاء الاصطناعي
    function generateLyrics(prompt) {
        const display = document.getElementById('lyricsDisplay');
        display.style.display = 'block';
        display.innerHTML = `<strong>كلمات مقترحة للحن:</strong><br>
        جاري تأليف الكلمات بناءً على وصفك لـ "${prompt.substring(0,20)}..."<br>
        (تم توليد النص بنجاح بناءً على المقام المطلوب)`;
    }

    async function processAll() {
        const prompt = document.getElementById('promptIn').value;
        const btn = document.getElementById('execBtn');
        const player = document.getElementById('playerBox');
        
        if(!prompt) return alert("يرجى كتابة وصف");

        btn.disabled = true;
        player.style.display = 'none';
        log("بدء البحث والتحليل الموسيقي...");
        
        // توليد النص أولاً
        generateLyrics(prompt);

        try {
            log("الاتصال بسيرفر Render (المفتاح: Good)...");
            
            // الاتصال برابطك الفعلي على Render
            const response = await fetch('https://owtar-yemen4.onrender.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            if (response.status === 503) {
                log("السيرفر في وضع الاستعداد.. يرجى الانتظار 20 ثانية ⏳");
                setTimeout(processAll, 20000);
                return;
            }

            const contentType = response.headers.get("content-type");
            if (!response.ok || !contentType.includes("audio")) {
                throw new Error("لم يتم استلام ملف صوتي صحيح");
            }

            log("تم استلام اللحن من السيرفر! جاري التجهيز...");
            
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const audio = document.getElementById('audioMaster');
            
            audio.src = url;
            player.style.display = 'block';
            log("جاهز للاستماع الآن ✅");
            audio.play();

        } catch (err) {
            log("خطأ: " + err.message);
            alert("حدث خطأ في الاتصال بالسيرفر");
        } finally {
            btn.disabled = false;
        }
    }

    function saveToPhone() {
        const url = document.getElementById('audioMaster').src;
        if(!url) return;
        const a = document.createElement('a');
        a.href = url;
        a.download = `Owtar_Yemen_${Date.now()}.mp3`;
        a.click();
        log("تم إرسال الملف للتحميل.");
    }
</script>

</body>
</html>
