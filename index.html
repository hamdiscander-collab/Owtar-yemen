<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوتار اليمن - Owtar Yemen.HS</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #d4af37; /* لون ذهبي */
            text-align: center;
            padding: 20px;
        }
        .container {
            border: 2px solid #d4af37;
            border-radius: 15px;
            padding: 20px;
            margin-top: 50px;
            background-color: #262626;
        }
        .status-badge {
            background-color: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        button {
            background-color: #d4af37;
            color: #1a1a1a;
            border: none;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        button:hover { background-color: #f1c40f; }
    </style>
</head>
<body>

    <div class="container">
        <h1>أوتار اليمن.HS 🎸</h1>
        <p>استوديو الذكاء الاصطناعي للفن اليمني الأصيل</p>
        <div id="status">جاري الاتصال بشبكة Pi...</div>
        
        <hr style="border: 0.5px solid #444; margin: 20px 0;">
        
        <div id="user-info" style="display:none;">
            <p>أهلاً بك يا <span id="username" style="color: #fff;"></span></p>
            <button onclick="generateMusic()">توليد نغمة عود بالذكاء الاصطناعي</button>
        </div>
    </div>

    <script>
        const Pi = window.Pi;
        
        async function initPi() {
            try {
                // تفعيل وضع Sandbox للمطورين
                await Pi.init({ version: "2.0", sandbox: true });
                
                // طلب تسجيل الدخول للحصول على اسم المستخدم
                const scopes = ['username'];
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                document.getElementById('status').innerHTML = '<span class="status-badge">متصل بشبكة Pi ✅</span>';
                document.getElementById('user-info').style.display = 'block';
                document.getElementById('username').innerText = auth.user.username;
                
            } catch (err) {
                document.getElementById('status').innerHTML = 'خطأ في الاتصال: تأكد من فتحه داخل Pi Browser';
                console.error(err);
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("هناك عملية دفع غير مكتملة", payment);
        };

        function generateMusic() {
            alert("جاري تحضير أوتار العود... (هذه الميزة ستعمل بعد ربط الـ API)");
        }

        // تشغيل التهيئة عند تحميل الصفحة
        window.onload = initPi;
    </script>
</body>
</html>
