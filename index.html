<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوتار اليمن.HS</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background: #0F0F10; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        textarea { width: 100%; height: 100px; border-radius: 10px; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 15px; border-radius: 10px; background: #D4AF37; border: none; font-weight: bold; cursor: pointer; }
        #statusLog { font-size: 12px; color: #888; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <h1>أوتار اليمن.HS</h1>
    <div id="userStatus">جاري تهيئة النظام...</div>
    <textarea id="promptIn" placeholder="اكتب كلمات الأغنية..."></textarea>
    <button id="execBtn" onclick="generate()">إنتاج العمل الفني ✨</button>
    <audio id="audioMaster" controls style="width: 100%; margin-top: 20px; display: none;"></audio>
    <div id="statusLog">> بانتظار أمرك...</div>
</div>

<script>
    const Pi = window.Pi;
    function log(msg) { document.getElementById('statusLog').innerHTML += `<br>> ${msg}`; }

    window.onload = function() {
        if (window.Pi) {
            Pi.init({ version: "1.5", sandbox: true });
            setTimeout(async () => {
                try {
                    const auth = await Pi.authenticate(['username'], () => {});
                    document.getElementById('userStatus').innerText = "مرحباً " + auth.user.username;
                    log("تمت المصادقة.");
                } catch (e) { log("خطأ مصادقة: " + e.message); }
            }, 2000);
        }
    };

    async function generate() {
        const prompt = document.getElementById('promptIn').value;
        const audio = document.getElementById('audioMaster');
        log("جاري التوليد...");
        
        const response = await fetch('https://owtar-yemen5.onrender.com', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: prompt })
        });

        if (response.ok) {
            const blob = await response.blob();
            audio.src = URL.createObjectURL(blob);
            audio.style.display = "block";
            audio.play();
            log("اكتمل الإنتاج بنجاح ✅");
        } else {
            log("فشل الإنتاج. تأكد من مفتاح OpenAI.");
        }
    }
</script>
</body>
</html>
