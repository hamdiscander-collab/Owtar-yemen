<!-- Pi SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script type="module">
let authData = null;

// زر تسجيل دخول (سيظهر أسفل الصفحة)
const loginBtn = document.createElement("button");
loginBtn.innerText = "🔐 تسجيل الدخول بـ Pi";
loginBtn.style.cssText = `
  margin-top:15px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#6c4cff;
  color:#fff;
`;
document.body.appendChild(loginBtn);

// دالة تسجيل الدخول
async function startPiAuth() {
  try {
    if (!window.Pi) {
      console.error("Pi SDK not loaded");
      return;
    }

    // ✅ تهيئة SDK (مرة واحدة فقط)
    await Pi.init({ version: "2.0", sandbox: true });

    // ✅ تسجيل الدخول
    authData = await Pi.authenticate(['username']);

    console.log("Auth Success:", authData);

    // ✅ إرسال التوكن للسيرفر
    const res = await fetch("https://YOUR-SERVER.onrender.com/auth", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        accessToken: authData.accessToken
      })
    });

    const data = await res.json();

    document.body.innerHTML += `
      <div style="margin-top:15px;color:#00ffcc;">
        👤 مرحبًا ${data.username}
      </div>
    `;

  } catch (err) {
    console.error("Pi Auth Error:", err);
  }
}

// ✅ تشغيل تلقائي عند فتح التطبيق
window.addEventListener("load", () => {
  startPiAuth();
});

// ✅ زر يدوي
loginBtn.onclick = startPiAuth;

</script>
