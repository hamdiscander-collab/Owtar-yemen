<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوتار اليمن.HS | Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root { --gold: #d4af37; --black: #050505; --card: #121214; }
        body { background: var(--black); color: #e0e0e0; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid rgba(212,175,55,0.2); }
        .glass-card { background: var(--card); border: 1px solid #222; border-radius: 25px; padding: 25px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { width: 100%; background: #000; border: 1px solid #333; border-radius: 15px; color: #fff; padding: 15px; font-family: 'Cairo'; font-size: 16px; outline: none; margin-top: 15px; box-sizing: border-box; }
        .btn-main { background: linear-gradient(45deg, var(--gold), #f1c40f); color: #000; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-main:active { transform: scale(0.95); }
        .terminal { background: #000; border-radius: 15px; padding: 15px; font-family: monospace; font-size: 12px; color: #00ff88; height: 150px; overflow-y: auto; margin-top: 20px; border: 1px solid #1a1a1a; text-align: right; }
        .player-box { display: none; margin-top: 20px; padding: 20px; background: #1a1a1a; border-radius: 20px; border: 1px solid var(--gold); }
        audio { width: 100%; filter: invert(1); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="color:var(--gold); margin:0;">أوتار اليمن.HS 🎸</h1>
        <p style="color:#666; font-size:12px;">استوديو الذكاء الاصطناعي - النسخة المستقرة</p>
    </header>

    <main class="glass-card">
        <div style="color:var(--gold); font-weight:bold;">✍️ اكتب وصف اللحن:</div>
        <textarea id="promptArea" rows="3" placeholder="مثال: عود يمني حزين بمقام الراست..."></textarea>
        
        <button id="actionBtn" class="btn-main" onclick="startWork()">بدء الإنتاج الفني ✨</button>
        
        <div id="terminal" class="terminal">> نظام أوتار جاهز...</div>
    </main>

    <div id="resultBox" class="player-box">
        <div style="color:var(--gold); margin-bottom:10px;">🎧 اللحن المولد:</div>
        <audio id="audioOut" controls></audio>
    </div>
</div>

<script>
    function addLog(msg) {
        const term = document.getElementById('terminal');
        const time = new Date().toLocaleTimeString();
        term.innerHTML += `<br><span style="color:#444">[${time}]</span> > ${msg}`;
        term.scrollTop = term.scrollHeight;
    }

    async function startWork() {
        const prompt = document.getElementById('promptArea').value;
        const btn = document.getElementById('actionBtn');
        if(!prompt) return alert("اكتب وصفاً أولاً");

        btn.disabled = true;
        addLog("جاري الاتصال بـ Vercel لاستخدام مفتاح HF_Log...");

        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            if (response.status === 503) {
                addLog("تنبيه: السيرفر نائم.. سيتم إيقاظه تلقائياً خلال 20 ثانية ⏳");
                setTimeout(startWork, 20000);
                return;
            }

            if (!response.ok) throw new Error("فشل الاتصال");

            addLog("تم التوليد بنجاح! جاري تحميل النغمات...");
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const audio = document.getElementById('audioOut');
            audio.src = url;
            document.getElementById('resultBox').style.display = 'block';
            audio.play();
            addLog("اكتمل العمل الفني ✅");

        } catch (e) {
            addLog("خطأ فني: تأكد من مفتاح HF_Log في Vercel وعمل Redeploy.");
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
