<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أوتار اليمن.HS | الاستوديو السحابي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --gold-bright: #FFD700;
            --deep-black: #0D0D0D;
            --card-bg: #1A1A1A;
            --accent-green: #00FF9D;
            --text-gray: #A0A0A0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--deep-black);
            color: white;
            font-family: 'Cairo', sans-serif;
            overflow: hidden; /* لمنع السكرول الخارجي */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- خلفية متحركة --- */
        .bg-glow {
            position: fixed;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            top: -100px; right: -100px;
            z-index: -1;
        }

        /* --- الحاوية الرئيسية للتطبيق --- */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 92vh;
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            margin: 15px;
        }

        /* --- الهيدر (Header) --- */
        .app-header {
            padding: 30px 20px 10px;
            text-align: center;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .version-badge {
            font-size: 9px;
            background: #333;
            padding: 2px 8px;
            border-radius: 20px;
            color: var(--text-gray);
            vertical-align: middle;
        }

        /* --- منطقة العمل (Studio Space) --- */
        .studio-space {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .input-card {
            background: #000;
            border-radius: 25px;
            padding: 20px;
            border: 1px solid #222;
        }

        .label-style {
            color: var(--gold);
            font-size: 13px;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-family: 'Cairo';
            font-size: 16px;
            resize: none;
            outline: none;
            min-height: 80px;
        }

        /* --- زر الإنتاج الفخم --- */
        .btn-produce {
            background: linear-gradient(135deg, var(--gold), #B8860B);
            color: black;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-produce:active { transform: scale(0.95); }
        .btn-produce:disabled { opacity: 0.4; filter: grayscale(1); cursor: wait; }

        /* --- شاشة السجلات (Console) --- */
        .console-box {
            background: #080808;
            border-radius: 20px;
            padding: 15px;
            height: 100px;
            font-family: 'monospace';
            font-size: 11px;
            color: var(--accent-green);
            border: 1px solid #111;
            overflow-y: auto;
        }

        /* --- مشغل الموسيقى (The Master Player) --- */
        .master-player {
            display: none;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid var(--gold);
            border-radius: 30px;
            padding: 20px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .viz-bars {
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            margin-bottom: 15px;
        }

        .bar {
            width: 3px; height: 10px;
            background: var(--gold);
            border-radius: 10px;
            transition: 0.2s;
        }

        audio {
            width: 100%;
            height: 40px;
            filter: invert(1) hue-rotate(180deg) brightness(1.5);
        }

        /* --- فوتر التطبيق --- */
        .app-footer {
            padding: 20px;
            text-align: center;
            font-size: 11px;
            color: #444;
        }

        /* --- التنبيهات (Toasts) --- */
        #toast {
            position: absolute;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: black;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            display: none;
            z-index: 100;
        }

    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="app-container">
        <header class="app-header">
            <div class="logo-text">OWTAR.HS <span class="version-badge">PRO v6</span></div>
            <p style="color: #666; font-size: 10px; margin-top: 5px;">YEMENI MUSICAL AI CLOUD</p>
        </header>

        <main class="studio-space">
            
            <div class="input-card">
                <span class="label-style"><i class="fa-solid fa-wand-sparkles"></i> وصف اللحن</span>
                <textarea id="promptIn" placeholder="مثلاً: عود صنعاني حزين بمقام البيات، جودة استوديو..."></textarea>
            </div>

            <button id="mainBtn" class="btn-produce" onclick="startGeneration()">
                <span>بدء الإنتاج</span>
                <i class="fa-solid fa-play"></i>
            </button>

            <div id="playerPanel" class="master-player">
                <div class="viz-bars" id="visualizer"></div>
                <audio id="audioMaster" controls></audio>
                <button onclick="downloadMusic()" style="background:transparent; border:none; color:var(--gold); width:100%; font-size:12px; margin-top:10px; cursor:pointer;">
                    <i class="fa-solid fa-download"></i> حفظ في المعرض
                </button>
            </div>

            <div id="console" class="console-box">
                > نظام أوتار متصل بـ Render Cloud...<br>
                > بانتظار إدخال البيانات...
            </div>

        </main>

        <footer class="app-footer">
            <p>© 2026 Owtar Yemen AI - Pi App Studio</p>
        </footer>

        <div id="toast">جاري العمل...</div>
    </div>

    <script>
        // تهيئة المؤثرات البصرية
        const viz = document.getElementById('visualizer');
        for(let i=0; i<30; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            viz.appendChild(bar);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function writeLog(msg) {
            const con = document.getElementById('console');
            const time = new Date().toLocaleTimeString();
            con.innerHTML += `<br><span style="color:#333">[${time}]</span> > ${msg}`;
            con.scrollTop = con.scrollHeight;
        }

        function animateBars(active) {
            const bars = document.querySelectorAll('.bar');
            bars.forEach(b => {
                b.style.height = active ? (Math.random() * 25 + 5) + 'px' : '10px';
            });
        }

        let barsInterval;

        // الدالة الرئيسية
        async function startGeneration() {
            const prompt = document.getElementById('promptIn').value;
            const btn = document.getElementById('mainBtn');
            const panel = document.getElementById('playerPanel');

            if(!prompt) {
                showToast("يرجى كتابة وصف");
                return;
            }

            btn.disabled = true;
            panel.style.display = 'none';
            writeLog("بدء تشغيل السيرفرات السحابية...");
            writeLog("استخدام المفتاح الأمني: Good");

            barsInterval = setInterval(() => animateBars(true), 150);

            try {
                // الاتصال برابط Render الخاص بك تلقائياً
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (response.status === 503) {
                    writeLog("السيرفر نائم.. جاري الإيقاظ (15 ثانية)...");
                    setTimeout(startGeneration, 15000);
                    return;
                }

                if (!response.ok) throw new Error("فشل الربط");

                writeLog("اكتمل التوليد! جاري التحميل...");
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const audio = document.getElementById('audioMaster');
                
                audio.src = url;
                panel.style.display = 'block';
                audio.play();
                writeLog("اكتمل العمل بنجاح ✅");
                showToast("تم الإنتاج بنجاح!");

            } catch (err) {
                writeLog("خطأ: " + err.message);
                showToast("حدث خطأ في الاتصال");
            } finally {
                btn.disabled = false;
                clearInterval(barsInterval);
                animateBars(false);
            }
        }

        function downloadMusic() {
            const src = document.getElementById('audioMaster').src;
            if(!src) return;
            const a = document.createElement('a');
            a.href = src;
            a.download = `Owtar_HS_${Date.now()}.mp3`;
            a.click();
        }
    </script>
</body>
</html>
