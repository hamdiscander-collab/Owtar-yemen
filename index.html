<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوتار اليمن.HS | PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0b; --card: #161618; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; text-align: center; }
        .app-card { max-width: 500px; margin: auto; background: var(--card); border-radius: 25px; padding: 30px; border: 1px solid #333; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        h1 { color: var(--gold); margin-bottom: 5px; font-size: 26px; }
        textarea { width: 100%; background: #000; border: 1px solid #444; border-radius: 15px; color: #fff; padding: 15px; margin-top: 20px; box-sizing: border-box; outline: none; }
        .btn-main { background: linear-gradient(45deg, var(--gold), #b8860b); color: #000; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-main:active { transform: scale(0.96); }
        .status-box { background: #000; color: #00ff00; font-family: monospace; font-size: 12px; padding: 15px; margin-top: 20px; border-radius: 10px; text-align: right; height: 100px; overflow-y: auto; border: 1px solid #222; }
        #player { display: none; margin-top: 25px; width: 100%; filter: invert(1); }
    </style>
</head>
<body>

<div class="app-card">
    <h1>أوتار اليمن.HS 🎸</h1>
    <p style="color:#777; font-size:12px;">استوديو الذكاء الاصطناعي - النسخة الآمنة</p>
    
    <textarea id="promptInput" rows="3" placeholder="صف اللحن الذي تريده (مثلاً: عود صنعاني مبهج)..."></textarea>
    <button class="btn-main" onclick="startGeneration()">إنتاج اللحن الآن ✨</button>
    
    <div id="log" class="status-box">> بانتظار أوامرك...</div>
    <audio id="player" controls></audio>
</div>

<script>
    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `<br>> ${msg}`;
        log.scrollTop = log.scrollHeight;
    }

    async function startGeneration() {
        const prompt = document.getElementById('promptInput').value;
        if (!prompt) return alert("يرجى كتابة وصف أولاً");

        addLog("بدء الاتصال بالجسر الآمن (Secure Bridge)...");
        
        try {
            // نرسل الطلب إلى ملف generate.js الذي أنشأناه في مجلد api
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            if (!response.ok) throw new Error();

            addLog("تم التوليد بنجاح! جاري تحميل المقطع...");
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const player = document.getElementById('player');
            player.src = url;
            player.style.display = 'block';
            player.play();
            addLog("اكتمل العمل الفني ✅");

        } catch (e) {
            addLog("خطأ: السيرفر نائم أو الشبكة ضعيفة. حاول مجدداً.");
        }
    }
</script>

</body>
</html>
